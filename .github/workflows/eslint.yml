name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '35 18 * * 1'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ESLint tooling
        run: |
          npm install --no-save eslint@8.57.0 @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint and generate SARIF
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          npx eslint web \
            --config web/.eslintrc.cjs \
            --ext .ts,.tsx \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif || true

      - name: Ensure SARIF file exists
        run: |
          if [ ! -f eslint-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > eslint-results.sarif
          fi

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
