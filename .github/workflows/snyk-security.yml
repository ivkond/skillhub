name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Detect Snyk token availability
        id: gate
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [[ -n "${SNYK_TOKEN}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Snyk CLI to check for security issues
        if: steps.gate.outputs.enabled == 'true'
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code test
        if: steps.gate.outputs.enabled == 'true'
        run: snyk code test --sarif > snyk-code.sarif
        continue-on-error: true

      - name: Snyk Open Source test
        if: steps.gate.outputs.enabled == 'true'
        run: snyk test --all-projects --severity-threshold=high

      - name: Upload result to GitHub Code Scanning
        if: steps.gate.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        with:
          sarif_file: snyk-code.sarif

      - name: Explain skip reason
        if: steps.gate.outputs.enabled != 'true'
        run: echo "::warning::Skipping Snyk scan because SNYK_TOKEN secret is not configured."
