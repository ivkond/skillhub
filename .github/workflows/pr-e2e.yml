name: PR E2E Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'web/**'
      - 'server/**'
      - 'scripts/**'
      - 'docker-compose.yml'
      - 'compose.dev.yml'
      - 'compose.prod.yml'
      - 'Makefile'
      - '.github/workflows/pr-e2e.yml'
  workflow_dispatch:

concurrency:
  group: pr-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E (Real Services)
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x server/mvnw

      - name: Start full dev stack
        run: docker compose -p skillhub-pr-e2e -f compose.dev.yml up -d --build --wait

      - name: Install Playwright browsers
        run: cd web && pnpm exec playwright install --with-deps chromium

      # QA-02 explicit paths (do not rely on glob drift): e2e/collections-flow.spec.ts e2e/collections-visibility-guard.spec.ts
      - name: Run frontend E2E tests
        run: make test-e2e-frontend

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Playwright raw test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: web/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop full dev stack
        if: ${{ always() }}
        run: docker compose -p skillhub-pr-e2e -f compose.dev.yml down -v --remove-orphans
