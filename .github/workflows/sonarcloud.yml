name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      has_sonar_token: ${{ steps.gate.outputs.has_sonar_token }}
    steps:
      - name: Detect Sonar token availability
        id: gate
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -n "${SONAR_TOKEN}" ]]; then
            echo "has_sonar_token=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_sonar_token=false" >> "${GITHUB_OUTPUT}"
          fi

  analysis:
    needs: gate
    if: ${{ needs.gate.outputs.has_sonar_token == 'true' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
          projectBaseDir: .

  sonar-not-configured:
    needs: gate
    if: ${{ needs.gate.outputs.has_sonar_token != 'true' || vars.SONAR_PROJECT_KEY == '' || vars.SONAR_ORGANIZATION == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        run: echo "::warning::Skipping SonarCloud analysis because SONAR_TOKEN, SONAR_PROJECT_KEY, or SONAR_ORGANIZATION is not configured."
